<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>自媒体创作助手</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">🎬</div>
    <span class="header-title">自媒体创作助手</span>
  </div>
  <div class="header-actions">
    <button class="btn-stop" id="btnStop" title="停止生成">⏹</button>
  </div>
</div>

<!-- ============================================================
     TAB CONTENT
     ============================================================ -->
<div class="tab-content">

  <!-- TAB 1: 故事板 -->
  <div class="tab-panel active" id="tabStoryboard">

    <!-- 阶段A: 问答收集区 -->
    <div class="sb-interview" id="sbInterview">
      <div class="sb-interview-inner">

        <!-- 进度点 -->
        <div class="sb-progress-dots" id="sbProgressDots"></div>

        <!-- 问题 -->
        <div class="sb-interview-question" id="sbQuestion"></div>

        <!-- 卡片选择区 -->
        <div class="sb-choice-grid" id="sbChoiceGrid"></div>
        <div class="sb-choice-grid" id="sbChoiceGridB" style="margin-top:8px"></div>

        <!-- 可选补充 -->
        <div class="sb-supplement" id="sbSupplement" style="display:none">
          <label class="sb-supplement-label" id="sbSupplementLabel"></label>
          <textarea class="sb-interview-textarea" id="sbSupplementInput" rows="2"></textarea>
        </div>

        <!-- 自由输入区 -->
        <div class="sb-free-input" id="sbFreeInput" style="display:none">
          <textarea class="sb-interview-textarea" id="sbAnswer" rows="6" placeholder="描述从头到尾发生了什么，或粘贴视频文案/解说词…"></textarea>
          <div class="sb-interview-toolbar">
            <button class="sb-voice-btn" id="btnVoice" title="语音输入">🎤</button>
            <span class="sb-voice-hint" id="voiceHint">点击麦克风开始说话</span>
          </div>
        </div>

        <!-- 导航 -->
        <div class="sb-interview-nav">
          <button class="sb-nav-btn secondary" id="btnPrevQ" disabled>← 上一题</button>
          <button class="sb-nav-btn primary" id="btnNextQ">下一题 →</button>
        </div>

      </div>
    </div>

    <!-- 阶段B: 故事板展示区（生成后显示） -->
    <div class="sb-board" id="sbBoard" style="display:none">

      <!-- 导演分析 -->
      <div class="sb-section">
        <div class="sb-section-header" id="btnToggleDirector">
          <span>🎬 导演分析</span>
          <span class="sb-section-toggle">▾</span>
        </div>
        <div class="sb-section-body" id="sbDirectorBody">
          <div id="sbDirectorBrief"></div>
          <div class="sb-rhythm-bar" id="sbRhythmMap"></div>
          <div class="sb-emotion-curve" id="sbEmotionCurve"></div>
          <div class="sb-audience" id="sbAudience"></div>
        </div>
      </div>

      <!-- 分镜卡片 -->
      <div class="sb-section">
        <div class="sb-section-header"><span>🎥 分镜脚本</span></div>
        <div class="sb-section-body">
          <div class="sb-shot-list" id="sbShotList"></div>
          <button class="sb-add-shot-btn" id="btnSbAddShot">+ 新增镜头</button>
        </div>
      </div>

      <!-- 操作栏 -->
      <div class="sb-actions-bar">
        <button class="dialog-btn secondary" id="btnSbReplaceChar">🔄 替换形象</button>
        <button class="dialog-btn secondary" id="btnSbReplaceScene">🔄 替换场景</button>
        <button class="dialog-btn secondary" id="btnSbReset">🔄 重新生成</button>
        <button class="dialog-btn primary" id="btnSbCopyPrompt">📋 复制提示词</button>
        <button class="dialog-btn secondary" id="btnSbCopyJson">📋 复制JSON</button>
      </div>

    </div>
  </div>

  <!-- TAB 2: 我的 -->
  <div class="tab-panel" id="tabMe">
    <div class="me-scroll">

      <!-- 资产管理 -->
      <div class="me-card-box">
        <div class="me-section-head"><span>🗂 资产</span></div>
        <div style="display:flex;gap:12px">
          <div class="asset-entry-btn" id="btnCharManager" onclick="openCharacterManager()">
            <span class="asset-entry-icon">💃</span>
            <span class="asset-entry-label">形象管理</span>
            <span class="asset-entry-count" id="charCount">0个</span>
          </div>
          <div class="asset-entry-btn" id="btnSceneManager" onclick="openSceneManager()">
            <span class="asset-entry-icon">🏠</span>
            <span class="asset-entry-label">场景管理</span>
            <span class="asset-entry-count" id="sceneCount">0个</span>
          </div>
        </div>
      </div>

      <!-- 生成记录 -->
      <div class="me-card-box">
        <div class="me-section-head"><span>📋 生成记录</span></div>
        <div id="sbRecordList" style="font-size:.76rem;color:#a09888;text-align:center;padding:12px 0">暂无记录</div>
      </div>

      <!-- 设置入口 -->
      <div class="me-card-box" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="document.getElementById('settingsOverlay').classList.add('open')">
        <span style="font-weight:600;font-size:.85rem">⚙ 设置</span>
        <span style="font-size:.72rem;color:#818cf8">API Key / Model →</span>
      </div>

      <div class="me-card-box" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" id="btnLogoutCard">
        <span style="font-weight:600;font-size:.85rem;color:#e57373">退出登录</span>
        <span style="font-size:.72rem;color:#e57373">→</span>
      </div>

    </div>
  </div>

</div>

<!-- Tab bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="tabStoryboard">
    <span class="tab-icon">🎬</span>
    <span class="tab-label">故事板</span>
  </div>
  <div class="tab-item" data-tab="tabMe">
    <span class="tab-icon">👤</span>
    <span class="tab-label">我的</span>
  </div>
</div>

<!-- ============================================================
     SETTINGS OVERLAY
     ============================================================ -->
<div class="overlay" id="settingsOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="dialog settings-dialog">
    <div class="dialog-header">
      <span class="dialog-title">⚙ 设置</span>
      <button class="btn-icon" onclick="document.getElementById('settingsOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="dialog-body">
      <div class="me-card-box" style="border:none;padding:0">
        <div class="me-section-head"><span>🔑 API 配置</span></div>
        <div style="position:relative;margin-bottom:6px">
          <input type="password" class="me-input" id="meApiKey" placeholder="API Key：sk-..." autocomplete="off" style="padding-right:44px">
          <button id="btnToggleApiKey" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;background:transparent;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px" title="显示/隐藏">🙈</button>
        </div>
        <input type="text" class="me-input" id="meEndpoint" placeholder="Endpoint" readonly style="margin-bottom:6px;background:#f0ece4;color:#8a8278">
        <select class="me-input" id="meModel">
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-reasoner">deepseek-reasoner</option>
          <option value="qwen-plus">qwen-plus (通义千问)</option>
          <option value="qwen-max">qwen-max (通义千问)</option>
          <option value="glm-4">glm-4 (智谱)</option>
          <option value="moonshot-v1-8k">moonshot-v1-8k (月之暗面)</option>
          <option value="custom">自定义…</option>
        </select>
        <div id="meCustomModelField" style="display:none;margin-top:6px">
          <input type="text" class="me-input" id="meCustomModel" placeholder="输入 model ID">
        </div>
        <button class="dialog-btn primary" id="btnSaveApiConfig" style="margin-top:10px;width:100%">💾 保存 API 配置</button>
        <span id="apiConfigSaveHint" style="display:block;font-size:.72rem;color:#5b9a8b;text-align:center;height:18px"></span>
      </div>
      <button class="me-reset-btn" id="btnLogout" style="margin-top:4px;color:#e57373">退出登录</button>
    </div>
  </div>
</div>

<!-- ============================================================
     CHARACTER MANAGER OVERLAY
     ============================================================ -->
<div class="overlay" id="characterManagerOverlay" onclick="if(event.target===this)closeCharacterManager()">
  <div class="dialog settings-dialog">
    <div class="dialog-header">
      <span class="dialog-title">💃 形象管理</span>
      <button class="btn-icon" onclick="closeCharacterManager()">✕</button>
    </div>
    <div class="dialog-body" id="charManagerList">
      <div style="font-size:.76rem;color:#a09888;text-align:center;padding:24px 0">还没有形象，点击下方按钮创建</div>
    </div>
    <div class="dialog-footer">
      <button class="dialog-btn primary" onclick="closeCharacterManager();openCharacterEditor()" style="width:100%">+ 新建形象</button>
    </div>
  </div>
</div>

<!-- ============================================================
     SCENE MANAGER OVERLAY
     ============================================================ -->
<div class="overlay" id="sceneManagerOverlay" onclick="if(event.target===this)closeSceneManager()">
  <div class="dialog settings-dialog">
    <div class="dialog-header">
      <span class="dialog-title">🏠 场景管理</span>
      <button class="btn-icon" onclick="closeSceneManager()">✕</button>
    </div>
    <div class="dialog-body" id="sceneManagerList">
      <div style="font-size:.76rem;color:#a09888;text-align:center;padding:24px 0">还没有场景</div>
    </div>
    <div style="padding:12px 20px;border-top:1.5px solid #ede8e1;display:flex;flex-direction:column;gap:10px">
      <input class="me-input" id="newSceneName2" placeholder="场景名称：例如 厨房、办公室">
      <input class="me-input" id="newSceneDesc2" placeholder="场景描述：例如 明亮的开放式厨房">
      <button class="dialog-btn primary" onclick="addSceneFromManager()" style="width:100%">+ 添加场景</button>
    </div>
  </div>
</div>

<!-- ============================================================
     CHARACTER EDITOR OVERLAY
     ============================================================ -->
<div class="overlay" id="charEditorOverlay" onclick="if(event.target===this)closeCharacterEditor()">
  <div class="dialog" id="charEditorDialog">
    <div class="dialog-header">
      <span class="dialog-title" id="charEditorTitle">新建形象</span>
      <button class="btn-icon" id="btnCharEditorClose" onclick="closeCharacterEditor()">✕</button>
    </div>
    <div class="dialog-body">
      <div class="me-field">
        <label class="me-label">形象名称</label>
        <input class="me-input" id="charEditName" placeholder="例如：主角-日常、配角-顾客">
      </div>
      <div class="me-field">
        <label class="me-label">类型</label>
        <div class="chip-row" id="charEditType">
          <div class="chip active" data-value="protagonist">👤 主角</div>
          <div class="chip" data-value="supporting">👥 配角</div>
        </div>
      </div>
      <div class="me-field">
        <label class="me-label">性别 <span class="field-required">*必填</span></label>
        <div class="chip-row" id="charEditGender">
          <div class="chip" data-value="男">男</div>
          <div class="chip" data-value="女">女</div>
        </div>
      </div>
      <div class="me-field">
        <label class="me-label">服装 <span class="field-required">*必填</span></label>
        <input class="me-input" id="charEditClothing" placeholder="例如：白色棉麻衬衫+深蓝围裙">
      </div>
      <div class="me-field" id="charEditRelationshipField" style="display:none">
        <label class="me-label">与主角关系</label>
        <input class="me-input" id="charEditRelationship" placeholder="例如：顾客、路人、朋友、专家">
      </div>
      <div class="me-field">
        <label class="me-label">年龄</label>
        <input class="me-input" id="charEditAge" placeholder="例如：28岁">
      </div>
      <div class="me-field">
        <label class="me-label">发型</label>
        <input class="me-input" id="charEditHair" placeholder="例如：黑色齐肩短发">
      </div>
      <div class="me-field">
        <label class="me-label">体型</label>
        <input class="me-input" id="charEditBuild" placeholder="例如：身高165，偏瘦">
      </div>
      <div class="me-field">
        <label class="me-label">标志特征</label>
        <input class="me-input" id="charEditFeatures" placeholder="例如：银色细框眼镜，右手腕银手链">
      </div>
    </div>
    <div class="dialog-footer">
      <button class="dialog-btn danger" id="btnCharDelete" style="display:none" onclick="deleteCharacterFromDialog()">删除</button>
      <button class="dialog-btn secondary" id="btnCharCancel" onclick="closeCharacterEditor()">取消</button>
      <button class="dialog-btn primary" id="btnCharSave" onclick="saveCharacterFromDialog()">保存</button>
    </div>
  </div>
</div>

<!-- ============================================================
     LOGIN PAGE
     ============================================================ -->
<div class="overlay" id="loginPage" style="background:#f7f3ed">
  <div style="display:flex;flex-direction:column;align-items:center;gap:20px;width:340px;max-width:90vw;text-align:center">
    <div style="font-size:3rem">🎬</div>
    <div>
      <div style="font-size:1.3rem;font-weight:700;color:#2d2a26;margin-bottom:4px">自媒体创作助手</div>
      <div style="font-size:.82rem;color:#8a8278">导演分镜表 · 即梦提示词</div>
    </div>
    <!-- 登录/注册 Tab -->
    <div style="display:flex;width:100%;background:#ede8e1;border-radius:10px;padding:3px">
      <div class="login-tab active" data-mode="login" style="flex:1;padding:10px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:#8a8278">登录</div>
      <div class="login-tab" data-mode="register" style="flex:1;padding:10px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:#8a8278">注册</div>
    </div>
    <style>.login-tab.active{background:#fff;color:#2d2a26;box-shadow:0 1px 3px rgba(0,0,0,.06)}</style>
    <!-- 表单 -->
    <div style="width:100%;display:flex;flex-direction:column;gap:10px" id="loginForm">
      <input type="text" class="me-input" id="loginEmail" placeholder="用户名" style="text-align:center">
      <input type="tel" class="me-input" id="loginPhone" placeholder="手机号（11位，用于找回密码）" style="text-align:center;display:none">
      <input type="password" class="me-input" id="loginPassword" placeholder="密码（至少6位）" style="text-align:center">
      <button class="dialog-btn primary" id="btnLogin" style="width:100%">登录</button>
      <button id="btnForgotPwd" style="background:none;border:none;color:#8a8278;font-size:.75rem;cursor:pointer;padding:4px 0">忘记密码？</button>
    </div>
    <!-- 重置密码表单（初始隐藏） -->
    <div style="width:100%;display:flex;flex-direction:column;gap:10px;display:none" id="resetPwdForm">
      <div style="font-size:.85rem;color:#2d2a26;font-weight:600;margin-bottom:4px">重置密码</div>
      <input type="text" class="me-input" id="resetEmail" placeholder="用户名" style="text-align:center">
      <input type="tel" class="me-input" id="resetPhone" placeholder="注册时填的手机号" style="text-align:center">
      <input type="password" class="me-input" id="resetPassword" placeholder="新密码（至少6位）" style="text-align:center">
      <button class="dialog-btn primary" id="btnResetPwd" style="width:100%">重置密码</button>
      <button id="btnBackToLogin" style="background:none;border:none;color:#8a8278;font-size:.75rem;cursor:pointer;padding:4px 0">← 返回登录</button>
    </div>
    <div id="loginError" style="font-size:.75rem;color:#e57373;display:none"></div>
  </div>
</div>

<!-- ============================================================
     SHOT EDITOR SHEET (bottom sheet)
     ============================================================ -->
<div class="shot-editor-sheet" id="shotEditorSheet">
  <div class="shot-editor-overlay" onclick="closeShotEditor()"></div>
  <div class="shot-editor-panel">
    <div class="shot-editor-header">
      <span class="shot-editor-title">编辑镜头</span>
      <button class="btn-icon" onclick="closeShotEditor()">✕</button>
    </div>
    <div class="shot-editor-body">
      <input type="hidden" id="seIndex">

      <div class="shot-editor-field">
        <label>景别</label>
        <div class="shot-editor-chips" id="seShotType">
          <span class="chip" data-value="远景">远景</span>
          <span class="chip" data-value="全景">全景</span>
          <span class="chip active" data-value="中景">中景</span>
          <span class="chip" data-value="近景">近景</span>
          <span class="chip" data-value="特写">特写</span>
        </div>
      </div>

      <div class="shot-editor-field">
        <label>时长 (秒)</label>
        <input class="me-input" id="seDuration" placeholder="例如：0-5s">
      </div>

      <div class="shot-editor-field">
        <label>角色</label>
        <select class="me-input" id="seCharacter"></select>
      </div>

      <div class="shot-editor-field">
        <label>角色站位</label>
        <input class="me-input" id="sePosition" placeholder="例如：画面中央">
      </div>

      <div class="shot-editor-field">
        <label>角色朝向</label>
        <input class="me-input" id="seDirection" placeholder="例如：面朝左下方">
      </div>

      <div class="shot-editor-field">
        <label>角色补充描述</label>
        <input class="me-input" id="seAdditionalDesc" placeholder="例如：惊讶表情，专注神态">
      </div>

      <div class="shot-editor-field">
        <label>动作</label>
        <textarea class="me-input" id="seAction" rows="3" placeholder="描述角色的具体动作和动态表现…"></textarea>
      </div>

      <div class="shot-editor-field">
        <label>场景</label>
        <select class="me-input" id="seScene"></select>
      </div>

      <div class="shot-editor-field">
        <label>场景环境描述</label>
        <input class="me-input" id="seEnvironment" placeholder="周围环境、物品、氛围">
      </div>

      <div class="shot-editor-field">
        <label>场景氛围</label>
        <input class="me-input" id="seAtmosphere" placeholder="例如：安静·专注 / 温馨·满足">
      </div>

      <div class="shot-editor-field">
        <label>光影类型</label>
        <input class="me-input" id="seLightType" placeholder="例如：暖色侧逆光">
      </div>

      <div class="shot-editor-field">
        <label>光影方向</label>
        <input class="me-input" id="seLightDir" placeholder="例如：左上方45°">
      </div>

      <div class="shot-editor-field">
        <label>运镜</label>
        <div class="shot-editor-chips" id="seCameraMov">
          <span class="chip" data-value="推">推</span>
          <span class="chip" data-value="拉">拉</span>
          <span class="chip" data-value="摇">摇</span>
          <span class="chip" data-value="移">移</span>
          <span class="chip" data-value="跟">跟</span>
          <span class="chip" data-value="俯">俯</span>
          <span class="chip" data-value="仰">仰</span>
        </div>
        <input class="me-input" id="seCameraCustom" placeholder="运镜补充描述…" style="margin-top:6px">
      </div>

      <div class="shot-editor-field">
        <label>视觉风格</label>
        <input class="me-input" id="seStyle" placeholder="例如：日系生活美学·低饱和暖调">
      </div>

      <div class="shot-editor-field">
        <label>画质</label>
        <input class="me-input" id="seQuality" placeholder="例如：4K 60fps">
      </div>

      <div class="shot-editor-field">
        <label>台词</label>
        <textarea class="me-input" id="seDialogue" rows="2" placeholder="镜头内的台词…"></textarea>
      </div>

      <div class="shot-editor-field">
        <label>导演备注</label>
        <textarea class="me-input" id="seNotes" rows="2" placeholder="特殊说明…"></textarea>
      </div>

      <!-- Continuity (衔接) -->
      <div class="shot-editor-field" id="seContinuityField">
        <label style="font-weight:700;color:#5b9a8b">🔗 与上一镜的衔接</label>
        <label>切换方式</label>
        <select class="me-input" id="seTransition">
          <option value="硬切 cut">硬切 cut</option>
          <option value="叠化 dissolve">叠化 dissolve</option>
          <option value="甩镜头 whip pan">甩镜头 whip pan</option>
          <option value="匹配剪辑 match cut">匹配剪辑 match cut</option>
        </select>
        <label>保留元素 (carryOver)</label>
        <input class="me-input" id="seCarryOver" placeholder="上一镜哪些元素延续，逗号分隔">
        <label>新入场元素 (newElements)</label>
        <input class="me-input" id="seNewElements" placeholder="这一镜新出现的元素，逗号分隔">
        <label>视线衔接 (eyeLine)</label>
        <input class="me-input" id="seEyeLine" placeholder="两镜之间角色视线方向变化">
        <label>动作链接 (actionLink)</label>
        <input class="me-input" id="seActionLink" placeholder="动作因果关系">
        <label>情绪链接 (emotionLink)</label>
        <input class="me-input" id="seEmotionLink" placeholder="情绪强度/类型变化">
        <label>运镜衔接 (cameraLink)</label>
        <input class="me-input" id="seCameraLink" placeholder="运镜方式对比/过渡">
      </div>

    </div>
    <div class="shot-editor-footer">
      <button class="dialog-btn danger" id="btnShotDelete" style="flex:1">🗑 删除</button>
      <button class="dialog-btn secondary" id="btnShotCancel" onclick="closeShotEditor()" style="flex:1">取消</button>
      <button class="dialog-btn primary" id="btnShotSave" style="flex:2">💾 保存镜头</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// Load Supabase async
var script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
script.onload = function() {
  var script2 = document.createElement('script');
  script2.src = 'supabase.js';
  document.head.appendChild(script2);
};
script.onerror = function() { console.log('Supabase CDN unavailable, running in offline mode'); };
document.head.appendChild(script);
</script>
