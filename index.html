<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自媒体创作助手</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;background:#fafaf9;height:100%}
body{
  height:100vh;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:#1c1917;background:#fafaf9;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
input,select,textarea,button{font-family:inherit}

/* ============================================================
   HEADER
   ============================================================ */
.header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#fff;border-bottom:1px solid #e7e5e4;
  z-index:10;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:#fff;
}
.header-title{font-size:.95rem;font-weight:700;color:#1c1917}
.header-right{display:flex;align-items:center;gap:8px}
.header-ctx{
  font-size:.7rem;color:#78716c;padding:4px 10px;
  background:#f5f5f4;border-radius:6px;max-width:200px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.btn-icon{
  width:34px;height:34px;border:none;border-radius:8px;
  background:#f5f5f4;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .15s;color:#57534e;
}
.btn-icon:hover{background:#e7e5e4}
.btn-icon.api-ok{background:#ecfdf5;color:#065f46}
.btn-icon.api-nok{background:#fef2f2;color:#dc2626}

/* ============================================================
   CONTEXT BAR
   ============================================================ */
.ctx-bar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:8px 16px;background:#fff;border-bottom:1px solid #e7e5e4;
  font-size:.72rem;color:#78716c;flex-wrap:wrap;
}
.ctx-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:6px;background:#f5f5f4;
  font-size:.68rem;color:#44403c;cursor:pointer;transition:all .15s;
}
.ctx-tag:hover{background:#fff7ed;color:#c2410c}

/* ============================================================
   CHAT AREA
   ============================================================ */
.chat-area{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.chat-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:#a8a29e;
}
.chat-empty-icon{font-size:3rem;opacity:.5}
.chat-empty-text{font-size:.85rem}
.chat-empty-hints{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:420px}
.chat-hint{
  padding:8px 14px;border:1.5px solid #e7e5e4;border-radius:8px;
  font-size:.75rem;color:#57534e;cursor:pointer;background:#fff;
  transition:all .15s;text-align:left;
}
.chat-hint:hover{border-color:#f97316;color:#c2410c;background:#fff7ed}

/* Scenario cards */
.scenario-card{
  padding:10px 14px;border:1.5px solid #e7e5e4;border-radius:10px;
  cursor:pointer;transition:all .15s;background:#fff;text-align:left;
  display:flex;flex-direction:column;gap:6px;min-width:200px;
}
.scenario-card:hover{border-color:#f97316;background:#fff7ed;transform:translateY(-1px);box-shadow:0 2px 8px rgba(249,115,22,.1)}
.sc-card-top{display:flex;align-items:center;gap:6px}
.sc-card-icon{font-size:1rem}
.sc-card-name{font-size:.78rem;font-weight:600;color:#1c1917}
.sc-card-label{font-size:.7rem;color:#f97316;font-weight:500}
.sc-card-topic{
  font-size:.62rem;padding:1px 6px;border-radius:4px;
  background:#fef3c7;color:#92400e;margin-left:2px;
}
.sc-card-desc{font-size:.7rem;color:#78716c;line-height:1.4}

/* Message bubble */
.msg{display:flex;gap:10px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;
}
.msg.user .msg-avatar{background:#fff7ed}
.msg.user{flex-direction:row-reverse}
.msg-body{max-width:82%;display:flex;flex-direction:column;gap:4px}
.msg.user .msg-body{align-items:flex-end}
.msg-content{
  padding:10px 14px;border-radius:12px;font-size:.85rem;line-height:1.6;
  word-break:break-word;position:relative;
}
.msg.user .msg-content{background:#f97316;color:#fff;border-radius:12px 12px 2px 12px}
.msg.assistant .msg-content{background:#fff;color:#1c1917;border:1px solid #e7e5e4;border-radius:12px 12px 12px 2px}
.msg-content pre{
  background:#1c1917;color:#f5f5f4;padding:14px;border-radius:8px;
  font-size:.78rem;line-height:1.5;overflow-x:auto;white-space:pre-wrap;
  margin:8px 0;position:relative;
}
.msg-content code{font-size:.78rem;font-family:"SF Mono","Fira Code","Cascadia Code",monospace}
.msg-content p code,.msg-content li code{
  background:#f5f5f4;padding:1px 5px;border-radius:3px;color:#c2410c;
}
.msg.user .msg-content code{background:rgba(255,255,255,.25);color:#fff}
.msg-content h1,.msg-content h2,.msg-content h3{
  font-size:.9rem;font-weight:600;margin:8px 0 4px;color:#1c1917;
}
.msg-content h1{font-size:1rem}
.msg-content ul,.msg-content ol{padding-left:18px}
.msg-content li{margin:2px 0}
.msg-content strong{color:#c2410c;font-weight:600}
.msg-content blockquote{
  border-left:3px solid #f97316;padding:4px 10px;margin:6px 0;
  color:#78716c;font-size:.8rem;
}

/* Copy button on pre blocks */
.copy-btn{
  position:absolute;top:6px;right:6px;
  padding:4px 10px;font-size:.68rem;border:none;border-radius:5px;
  background:#44403c;color:#e7e5e4;cursor:pointer;opacity:0;
  transition:all .15s;display:flex;align-items:center;gap:4px;
}
.msg-content pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:#57534e;color:#fff}
.copy-btn.copied{background:#10b981;color:#fff}

.msg-time{
  font-size:.65rem;color:#a8a29e;padding:0 4px;
}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;background:#d6d3d1;
  animation:bounce 1.4s infinite ease-in-out;
}
.typing-dots span:nth-child(1){animation-delay:0s}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.6)}40%{transform:scale(1)}}

/* ============================================================
   INPUT AREA
   ============================================================ */
.input-area{
  flex-shrink:0;padding:10px 16px 14px;background:#fff;
  border-top:1px solid #e7e5e4;display:flex;flex-direction:column;gap:8px;
}
.quick-actions{display:flex;gap:6px;flex-wrap:wrap}
.quick-btn{
  padding:4px 10px;border:1px solid #e7e5e4;border-radius:14px;
  background:#fafaf9;font-size:.68rem;color:#57534e;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.quick-btn:hover{border-color:#f97316;background:#fff7ed;color:#c2410c}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{
  flex:1;padding:10px 14px;border:1.5px solid #e7e5e4;border-radius:10px;
  font-size:.85rem;resize:none;outline:none;min-height:42px;max-height:120px;
  background:#fafaf9;transition:border-color .2s;line-height:1.4;
}
.input-box:focus{border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.1);background:#fff}
.btn-send{
  width:42px;height:42px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.btn-send:hover{box-shadow:0 4px 12px rgba(249,115,22,.3);transform:translateY(-1px)}
.btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ============================================================
   SETTINGS OVERLAY
   ============================================================ */
.settings-overlay{
  position:fixed;top:0;right:0;bottom:0;left:0;z-index:100;
  background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:flex-end;
  opacity:0;visibility:hidden;transition:all .25s;
}
.settings-overlay.open{opacity:1;visibility:visible}
.settings-panel{
  width:400px;max-width:100vw;height:100%;background:#fff;
  display:flex;flex-direction:column;overflow-y:auto;
  box-shadow:-8px 0 30px rgba(0,0,0,.15);
}
.settings-header{
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #e7e5e4;flex-shrink:0;
}
.settings-title{font-size:.95rem;font-weight:700}
.settings-body{flex:1;overflow-y:auto;padding:16px}
.settings-section{margin-bottom:20px}
.settings-section-label{
  font-size:.7rem;font-weight:600;color:#78716c;text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.settings-section-label::after{content:'';flex:1;height:1px;background:#e7e5e4}
.field{margin-bottom:12px}
.field-label{font-size:.78rem;font-weight:500;color:#44403c;margin-bottom:4px;display:block}
.field-hint{font-size:.68rem;color:#a8a29e;font-weight:400;margin-left:3px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;border:1.5px solid #e7e5e4;border-radius:8px;
  font-size:.82rem;color:#1c1917;background:#fafaf9;
  outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.1);background:#fff;
}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{position:relative}
.chip input{position:absolute;opacity:0;pointer-events:none}
.chip label{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 10px;border:1.5px solid #e7e5e4;border-radius:8px;
  font-size:.75rem;color:#57534e;cursor:pointer;
  transition:all .15s;background:#fafaf9;user-select:none;white-space:nowrap;
}
.chip input:checked+label{border-color:#f97316;background:#fff7ed;color:#c2410c;font-weight:600}
.chip label:hover{border-color:#d6d3d1;background:#fff}

.settings-tabs{
  display:flex;flex-shrink:0;border-bottom:1px solid #e7e5e4;
}
.settings-tab{
  flex:1;padding:11px 0;border:none;background:none;
  font-size:.78rem;color:#78716c;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;
  font-family:inherit;font-weight:500;
}
.settings-tab:hover{color:#44403c}
.settings-tab.active{color:#c2410c;border-bottom-color:#f97316;font-weight:600}
.settings-tab-panel{display:none;flex:1;overflow-y:auto;padding:16px}
.settings-tab-panel.active{display:block}
.settings-footer{
  flex-shrink:0;padding:12px 16px;border-top:1px solid #e7e5e4;
  display:flex;gap:8px;
}
.btn{
  padding:10px 20px;border:none;border-radius:10px;font-size:.85rem;
  font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;
}
.btn-primary{
  flex:1;background:linear-gradient(135deg,#f97316,#ea580c);
  color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.2);
}
.btn-primary:hover{box-shadow:0 4px 14px rgba(249,115,22,.35)}
.btn-secondary{
  background:#f5f5f4;color:#44403c;
}
.btn-secondary:hover{background:#e7e5e4}

/* ============================================================
   STATUS BAR
   ============================================================ */
.status-bar{
  font-size:.65rem;color:#a8a29e;text-align:center;padding:4px;
  border-top:1px solid #f0efed;flex-shrink:0;
}
.status-bar.error{color:#dc2626}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:640px){
  .header{padding:8px 12px}
  .header-title{font-size:.85rem}
  .header-ctx{display:none}
  .settings-panel{width:100vw}
  .msg-body{max-width:90%}
  .chat-area{padding:12px}
  .input-area{padding:8px 12px 12px}
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">✨</div>
    <span class="header-title">自媒体创作助手</span>
  </div>
  <div class="header-right">
    <span class="header-ctx" id="ctxBadge" title="当前业务配置">未配置</span>
    <button class="btn-icon" id="btnSettings" title="设置">⚙</button>
  </div>
</div>

<!-- ============================================================
     CONTEXT BAR
     ============================================================ -->
<div class="ctx-bar" id="ctxBar">
  <span style="font-size:.68rem;color:#a8a29e">当前配置:</span>
  <span class="ctx-tag" id="ctxBiz" title="点击修改">📋 <span id="ctxBizText">未设置</span></span>
  <span class="ctx-tag" id="ctxType">📹 短视频</span>
  <span class="ctx-tag" id="ctxPersona">🤖 智能推荐</span>
</div>

<!-- ============================================================
     CHAT AREA
     ============================================================ -->
<div class="chat-area" id="chatArea">
  <div class="chat-empty" id="chatEmpty">
    <div class="chat-empty-icon">💬</div>
    <div class="chat-empty-text" id="chatEmptyText">选择一种创作方式开始</div>
    <div class="chat-empty-hints" id="chatEmptyCards"></div>
  </div>
</div>

<!-- ============================================================
     INPUT AREA
     ============================================================ -->
<div class="input-area">
  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" data-action="换个角度重新生成">🔄 换个角度</button>
    <button class="quick-btn" data-action="写详细一些，加上具体的画面描述">🔍 更详细</button>
    <button class="quick-btn" data-action="精简一下，只要核心提示词">✂ 精简</button>
    <button class="quick-btn" data-action="加上爆款标题建议">🔥 加标题</button>
    <button class="quick-btn" data-action="清空对话，重新开始">🗑 重新开始</button>
  </div>
  <div class="input-row">
    <textarea class="input-box" id="inputBox" rows="1" placeholder="描述你的自媒体内容需求…（Enter 发送，Shift+Enter 换行）"></textarea>
    <button class="btn-send" id="btnSend" disabled>➤</button>
  </div>
</div>

<!-- ============================================================
     STATUS BAR
     ============================================================ -->
<div class="status-bar" id="statusBar">就绪 — 请先在设置中配置 API Key</div>

<!-- ============================================================
     SETTINGS OVERLAY
     ============================================================ -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span class="settings-title">⚙ 设置</span>
      <button class="btn-icon" id="btnSettingsClose">✕</button>
    </div>
    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="tabBiz">📋 业务信息</button>
      <button class="settings-tab" data-tab="tabApi">🔑 API 配置</button>
    </div>
    <div class="settings-tab-panel active" id="tabBiz">
      <div class="settings-section">
        <div class="settings-section-label">📋 基本信息</div>
        <div class="field">
          <label class="field-label">业务/账号名称</label>
          <input type="text" id="setBizName" placeholder="例如：XX健身、YY美食探店">
        </div>
        <div class="field">
          <label class="field-label">默认内容类型</label>
          <div class="chips" id="setContentType">
            <span class="chip"><input type="radio" name="setCt" value="short-video" checked><label>🎬 短视频</label></span>
            <span class="chip"><input type="radio" name="setCt" value="image-text"><label>🖼 图文</label></span>
            <span class="chip"><input type="radio" name="setCt" value="long-article"><label>📝 长文</label></span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">人设风格</label>
          <div class="chips" id="setPersona">
            <span class="chip"><input type="radio" name="setPersona" value="auto" checked><label>🤖 智能推荐</label></span>
            <span class="chip"><input type="radio" name="setPersona" value="teacher"><label>🎓 教导者</label></span>
            <span class="chip"><input type="radio" name="setPersona" value="companion"><label>🤝 陪伴者</label></span>
            <span class="chip"><input type="radio" name="setPersona" value="foil"><label>🌱 陪衬者</label></span>
            <span class="chip"><input type="radio" name="setPersona" value="admirer"><label>🔍 崇拜者</label></span>
            <span class="chip"><input type="radio" name="setPersona" value="comedian"><label>😄 搞笑者</label></span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">语言风格</label>
          <select id="setLanguage">
            <option value="普通话">普通话</option>
            <option value="粤语">粤语</option>
            <option value="英语">英语</option>
            <option value="日语">日语</option>
            <option value="custom">自定义方言/语言…</option>
          </select>
        </div>
        <div class="field" id="customLanguageField" style="display:none">
          <label class="field-label">自定义语言</label>
          <input type="text" id="setCustomLanguage" placeholder="例如：重庆话、客家话、闽南话…">
        </div>
      </div>
    </div>
    <div class="settings-tab-panel" id="tabApi">
      <div class="settings-section">
        <div class="settings-section-label">🔑 API 配置</div>
        <div class="field">
          <label class="field-label">API Key</label>
          <input type="password" id="setApiKey" placeholder="sk-...">
        </div>
        <div class="field">
          <label class="field-label">API Endpoint <span class="field-hint">OpenAI 兼容接口</span></label>
          <input type="text" id="setEndpoint" placeholder="https://api.deepseek.com/v1">
        </div>
        <div class="field">
          <label class="field-label">Model</label>
          <select id="setModel">
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="deepseek-reasoner">deepseek-reasoner</option>
            <option value="qwen-plus">qwen-plus (通义千问)</option>
            <option value="qwen-max">qwen-max (通义千问)</option>
            <option value="glm-4">glm-4 (智谱)</option>
            <option value="moonshot-v1-8k">moonshot-v1-8k (月之暗面)</option>
            <option value="custom">自定义…</option>
          </select>
        </div>
        <div class="field" id="customModelField" style="display:none">
          <label class="field-label">自定义 Model 名称</label>
          <input type="text" id="setCustomModel" placeholder="输入 model ID">
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn btn-secondary" id="btnResetSettings">恢复默认</button>
      <button class="btn btn-primary" id="btnSaveSettings">保存设置</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA CONSTANTS
// ============================================================
var PERSONAS = {
  auto:      { name:'智能推荐', icon:'🤖', desc:'根据业务类型自动匹配最佳人设角度' },
  teacher:   { name:'教导者',   icon:'🎓', desc:'专家/老师分享专业知识和经验' },
  companion: { name:'陪伴者',   icon:'🤝', desc:'朋友/同伴分享日常和心路历程' },
  foil:      { name:'陪衬者',   icon:'🌱', desc:'学习者/试错者展示真实成长过程' },
  admirer:   { name:'崇拜者',   icon:'🔍', desc:'鉴赏者/推荐者筛选和评测优质内容' },
  comedian:  { name:'搞笑者',   icon:'😄', desc:'幽默/娱乐方式呈现内容' },
};

var PERSONA_SCENARIOS = {
  'short-video': {
    teacher:   { label:'专家教学', topicType:'科普知识', desc:'以专家身份分享{biz}的专业知识，建立权威感，吸引精准粉丝' },
    companion: { label:'朋友分享', topicType:'讲故事', desc:'以朋友口吻记录{biz}的真实日常和心路历程，拉近距离' },
    foil:      { label:'成长记录', topicType:'成长记录', desc:'以学习者的视角，展示{biz}从零开始的试错和成长' },
    admirer:   { label:'测评推荐', topicType:'好物推荐', desc:'以鉴赏者角度，评测和推荐{biz}相关的优质好物' },
    comedian:  { label:'轻松娱乐', topicType:'搞笑娱乐', desc:'用幽默有趣的方式，呈现{biz}的花式玩法和搞笑内容' },
  },
  'image-text': {

function getLanguageDisplay() {

function getSeasonContext() {
  var m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5) return { season:'春季', themes:'踏青、焕新、春季养生、春装、花粉过敏、春招' };
  if (m >= 6 && m <= 8) return { season:'夏季', themes:'避暑、暑假、防晒、减肥、毕业季、夜经济' };
  if (m >= 9 && m <= 11) return { season:'秋季', themes:'开学季、秋装、贴秋膘、国庆出行、双十一' };
  return { season:'冬季', themes:'保暖、年货、寒假、年终总结、春节、春运' };
}

function recommendPersona(name) {
  var n = name || '';
  if (/教育|培训|课程|学|考|辅导|教练|导师/.test(n)) return 'teacher';
  if (/搞笑|娱乐|段子|吐槽|幽默|整蛊/.test(n)) return 'comedian';
  if (/测评|推荐|排行|精选|探店|种草|评测/.test(n)) return 'admirer';
  if (/记录|日常|vlog|日记|生活|成长|学习/.test(n)) return 'companion';
  if (/新手|小白|入门|从零|学渣|菜鸟/.test(n)) return 'foil';
  return 'companion';
}

function init() {

function loadSettings() {
  try {
    var saved = localStorage.getItem('zimeiti-settings');
    if (saved) {
      var parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(function(k) { settings[k] = parsed[k]; });
    }
  } catch (e) {}
}

function saveSettings() {
  localStorage.setItem('zimeiti-settings', JSON.stringify(settings));
}

function applySettings() {
  document.getElementById('setApiKey').value = settings.apiKey;
  document.getElementById('setEndpoint').value = settings.endpoint;

  document.getElementById('setCustomModel').value = settings.customModel || '';

function bindEvents() {
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('btnSettingsClose').addEventListener('click', closeSettings);
  document.getElementById('settingsOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });
  document.getElementById('btnSaveSettings').addEventListener('click', saveSettingsFromUI);
  document.getElementById('btnResetSettings').addEventListener('click', resetSettings);
  document.getElementById('setModel').addEventListener('change', function() {
    document.getElementById('customModelField').style.display = this.value === 'custom' ? 'block' : 'none';
  });
  document.getElementById('setLanguage').addEventListener('change', function() {
    document.getElementById('customLanguageField').style.display = this.value === 'custom' ? 'block' : 'none';
  });

  // Settings tabs
  document.querySelectorAll('.settings-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.settings-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.settings-tab-panel').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      document.getElementById(this.dataset.tab).classList.add('active');
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('settingsOverlay').classList.contains('open')) {
      closeSettings();
    }
  });

  document.getElementById('btnSend').addEventListener('click', sendMessage);
  document.getElementById('inputBox').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.getElementById('inputBox').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('quickActions').addEventListener('click', function(e) {
    var btn = e.target.closest('.quick-btn');
    if (!btn) return;
    var action = btn.dataset.action;
    if (action === '清空对话，重新开始') {
      clearChat();
      return;
    }
    document.getElementById('inputBox').value = action;
    sendMessage();
  });

  document.getElementById('chatEmpty').addEventListener('click', function(e) {
    var card = e.target.closest('.scenario-card');
    if (!card) return;
    settings.persona = card.dataset.persona;
    document.getElementById('inputBox').value = card.dataset.firstMsg;
    updateCtxBar();
    sendMessage();
  });

  document.getElementById('ctxBiz').addEventListener('click', function() {
    openSettings();
  });

  // Delegation for dynamically re-created cards
  document.getElementById('chatArea').addEventListener('click', function(e) {
    var card = e.target.closest('.scenario-card');
    if (card) {
      settings.persona = card.dataset.persona;
      document.getElementById('inputBox').value = card.dataset.firstMsg;
      updateCtxBar();
      sendMessage();
    }
  });
}

function addMessage(role, content) {
  var msg = { role: role, content: content, time: new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }) };
  messages.push(msg);
  renderMessage(msg);
  scrollToBottom();
  return msg;
}

function renderMessage(msg) {
  var chatArea = document.getElementById('chatArea');
  var emptyEl = document.getElementById('chatEmpty');
  if (emptyEl) emptyEl.style.display = 'none';

  var div = document.createElement('div');
  div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'assistant');

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = msg.role === 'user' ? '👤' : '✨';

  var body = document.createElement('div');
  body.className = 'msg-body';

  var content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = msg._html || escapeHtml(msg.content);

  var time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = msg.time;

  body.appendChild(content);
  body.appendChild(time);
  div.appendChild(avatar);
  div.appendChild(body);
  chatArea.appendChild(div);

  if (msg.role === 'assistant' && msg._done) {
    div.querySelectorAll('pre').forEach(function(pre) { addCopyButton(pre); });
  }

  msg._el = div;
  msg._contentEl = content;
}

function addStreamingMessage() {
  var chatArea = document.getElementById('chatArea');
  var emptyEl = document.getElementById('chatEmpty');
  if (emptyEl) emptyEl.style.display = 'none';

  var msg = { role: 'assistant', content: '', time: new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }), _streaming: true };
  messages.push(msg);

  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML =
    '<div class="msg-avatar">✨</div>' +
    '<div class="msg-body">' +
      '<div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div>' +
      '<div class="msg-time">' + msg.time + '</div>' +
    '</div>';

  chatArea.appendChild(div);
  msg._el = div;
  msg._contentEl = div.querySelector('.msg-content');
  scrollToBottom();
  return msg;
}

function appendStreamToken(msg, token) {
  msg.content += token;
  msg._contentEl.innerHTML = renderMarkdown(msg.content);
  scrollToBottom();
}

function finishStreaming(msg) {
  msg._streaming = false;
  msg._done = true;
  msg._html = renderMarkdown(msg.content);
  msg._contentEl.innerHTML = msg._html;
  msg._contentEl.querySelectorAll('pre').forEach(function(pre) { addCopyButton(pre); });
  scrollToBottom();
  updateStatusBar();
  isGenerating = false;
  updateSendButton();
}

function addCopyButton(pre) {
  pre.querySelectorAll('.copy-btn').forEach(function(b) { b.remove(); });

  var btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = '📋 复制';
  btn.addEventListener('click', function() {
    var text = pre.textContent || '';
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '✓ 已复制';
      btn.classList.add('copied');
      setTimeout(function() { btn.innerHTML = '📋 复制'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.innerHTML = '✓ 已复制';
      btn.classList.add('copied');
      setTimeout(function() { btn.innerHTML = '📋 复制'; btn.classList.remove('copied'); }, 2000);
    });
  });
  pre.style.position = 'relative';
  pre.appendChild(btn);
}

// Simple markdown renderer
function renderMarkdown(text) {
  var html = escapeHtml(text);
  // Code blocks first
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre>' + escapeHtml(code.trimEnd()) + '</pre>';
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list items
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  // Ordered list items
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  return html;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
function renderScenarioCards() {
  var container = document.getElementById('chatEmptyCards');
  if (!container) return;

  var ct = settings.contentType;
  var scenarios = PERSONA_SCENARIOS[ct] || PERSONA_SCENARIOS['short-video'];
  var biz = settings.bizName || '这个领域';
  var typeLabel = ct === 'short-video' ? '短视频' : ct === 'image-text' ? '图文' : '长文';

  var html = '';
  var keys = Object.keys(scenarios);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    var s = scenarios[key];
    var p = PERSONAS[key];
    var desc = s.desc.replace('{biz}', biz);

    var firstMsg = '我要做一个关于' + biz + '的' + typeLabel + '，用' + p.name + '（' + s.label + '）的风格来创作。选题类型倾向：' + s.topicType + '。帮我生成完整的' + typeLabel + '提示词。';

    html +=
      '<div class="scenario-card" data-persona="' + key + '" data-first-msg="' + escapeHtml(firstMsg) + '">' +
        '<div class="sc-card-top">' +
          '<span class="sc-card-icon">' + p.icon + '</span>' +
          '<span class="sc-card-name">' + p.name + '</span>' +
          '<span class="sc-card-label">' + s.label + '</span>' +
          '<span class="sc-card-topic">' + s.topicType + '</span>' +
        '</div>' +
        '<div class="sc-card-desc">' + desc + '</div>' +
      '</div>';
  }

  container.innerHTML = html;
}

// ============================================================
// API CALL
// ============================================================
function sendMessage() {
  var inputBox = document.getElementById('inputBox');
  var text = inputBox.value.trim();
  if (!text || !settings.apiKey || isGenerating) return;

  inputBox.value = '';
  inputBox.style.height = 'auto';
  isGenerating = true;
  updateSendButton();
  updateStatusBar('生成中…');

  addMessage('user', text);
  var assistantMsg = addStreamingMessage();

  var apiMessages = [
    { role: 'system', content: buildSystemPrompt() },
  ];
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    if (m._streaming) continue;
    apiMessages.push({ role: m.role, content: m.content });
  }

  var modelName = settings.model === 'custom' ? settings.customModel : settings.model;

  fetch(settings.endpoint.replace(/\/$/, '') + '/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + settings.apiKey,
    },
    body: JSON.stringify({
      model: modelName,
      messages: apiMessages,
      stream: true,
      temperature: 0.7,
      max_tokens: 4096,
    }),
  }).then(function(response) {
    if (!response.ok) {
      return response.text().then(function(errText) {
        throw new Error('API 请求失败 (' + response.status + '): ' + errText.slice(0, 200));
      });
    }
    return handleStream(response, assistantMsg);
  }).catch(function(err) {
    handleApiError(assistantMsg, err);
  });
}

function handleStream(response, assistantMsg) {
  var reader = response.body.getReader();
  var decoder = new TextDecoder();
  var buffer = '';

  function pump() {
    return reader.read().then(function(result) {
      if (result.done) {
        if (buffer.trim()) {
          processLine(buffer.trim(), assistantMsg);
          buffer = '';
        }
        finishStreaming(assistantMsg);
        return;
      }

      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (var i = 0; i < lines.length; i++) {
        processLine(lines[i], assistantMsg);
      }
      return pump();
    }).catch(function(err) {
      handleApiError(assistantMsg, err);
    });
  }

  return pump();
}

function processLine(line, assistantMsg) {
  var trimmed = line.trim();
  if (!trimmed || !trimmed.startsWith('data:')) return;
  var data = trimmed.slice(5).trim();
  if (data === '[DONE]') return;
  try {
    var json = JSON.parse(data);
    var delta = json.choices && json.choices[0] && json.choices[0].delta;
    if (delta && delta.content) {
      appendStreamToken(assistantMsg, delta.content);
    }
  } catch (e) {}
}

function handleApiError(assistantMsg, err) {
  assistantMsg._streaming = false;
  var errorText = err.message || '未知错误';
  assistantMsg.content = '**出错了：** ' + errorText;
  if (errorText.indexOf('401') !== -1) {
    assistantMsg.content += '\n\n> API Key 可能无效，请检查设置中的 Key 是否正确。';
  } else if (errorText.indexOf('404') !== -1) {
    assistantMsg.content += '\n\n> 接口地址可能不对，请检查 Endpoint 设置。';
  } else if (errorText.indexOf('Failed to fetch') !== -1 || errorText.indexOf('NetworkError') !== -1) {
    assistantMsg.content += '\n\n> 网络请求失败，请检查 Endpoint 地址是否可访问，或浏览器是否拦截了跨域请求。';
  }
  assistantMsg._html = renderMarkdown(assistantMsg.content);
  assistantMsg._contentEl.innerHTML = assistantMsg._html;
  assistantMsg._contentEl.querySelectorAll('pre').forEach(function(pre) { addCopyButton(pre); });
  assistantMsg._done = true;
  updateStatusBar('出错了 — ' + errorText.slice(0, 80));
  isGenerating = false;
  updateSendButton();
}

// ============================================================
// STATUS BAR
// ============================================================
function updateStatusBar(msg) {
  var bar = document.getElementById('statusBar');
  if (msg) {
    bar.textContent = msg;
    bar.classList.toggle('error', msg.indexOf('出错') !== -1 || msg.indexOf('失败') !== -1);
    return;
  }
  bar.classList.remove('error');
  if (!settings.apiKey) {
    bar.textContent = '就绪 — 请先在设置中配置 API Key（点击右上角 ⚙）';
  } else if (settings.bizName) {
    bar.textContent = '就绪 — ' + settings.bizName;
  } else {
    bar.textContent = '就绪';
  }
}

// ============================================================
// STARTUP
// ============================================================
init();
if (!settings.apiKey) {
  setTimeout(openSettings, 600);
}
</script>
